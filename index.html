<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عمر & رؤى</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playpen+Sans+Arabic:wght@100..800&display=swap');
    </style>

    <link rel="stylesheet" href="style.css">
    <script src="./main.js" defer></script>
</head>

<body>
    <div class="container">
        <div class="wedding">
            <div class="wedding__title">
                عمر & رؤى
            </div>

            <div class="wedding__content">
                <div class="heart">
                    <img src="./assets/heart.png" alt="Heart">
                </div>

                <div class="wedding__place custom-p">
                    يسرّنا دعوتكم لحضور حفل زفاف عمر و رؤى.
                </div>

                <div class="wedding__location">
                    <a href="https://maps.app.goo.gl/6dAm4P9dqzwveRUL7" target="_blank">
                        <button>
                            <svg xmlns="http://www.w3.org/2000/svg"
                                 width="20"
                                 height="20"
                                 viewBox="0 0 24 24"
                                 fill="none"
                                 stroke="currentColor"
                                 stroke-width="2"
                                 stroke-linecap="round"
                                 stroke-linejoin="round">
                                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                                <circle cx="12" cy="10" r="3"/>
                            </svg>
                            <span style="padding-inline-start: 8px;">الموقع</span>
                        </button>
                    </a>
                </div>

                <div class="wedding__date custom-p">
                    01-01-2027
                </div>

                <div class="wedding__countdown">
                    <div class="countdown days-c">
                        <p id="days">00</p>
                        <span>أيام</span>
                    </div>

                    <div class="countdown hours-c">
                        <p id="hours">00</p>
                        <span>ساعات</span>
                    </div>

                    <div class="countdown mins-c">
                        <p id="mins">00</p>
                        <span>دقائق</span>
                    </div>

                    <div class="countdown seconds-c">
                        <p id="seconds">00</p>
                        <span>ثوانٍ</span>
                    </div>
                </div>
            </div>

            <div class="wedding__subtitle custom-p">
                حتى موعد زفافنا!
            </div>

            <div class="wedding__quote">
                <div class="quote__img">
                    <img src="./assets/heart.png" alt="Heart">
                </div>

                <blockquote>
                    "اللهم بارك لنا وبارك علينا، واجمعنا على خير."
                </blockquote>
            </div>
        </div>
    </div>

    <div class="overlay-heart">
        <div class="wedding__title zoomOut">
            عمر & رؤى
        </div>

        <div class="butterfly"></div>
    </div>
</body>
</html>
